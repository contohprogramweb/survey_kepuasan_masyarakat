version: '3.8'

# =============================================================================
# Docker Compose untuk Aplikasi IKM v2.0.0
# Environment: Development (Tanpa Redis - Menggunakan Database Queue)
# =============================================================================

services:
  # =============================================================================
  # App Service: PHP 8.2-FPM + Nginx (Development dengan Volume Mount)
  # =============================================================================
  app-service:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: ikm_app_service
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      # Mount source code untuk development (hot reload)
      - ..:/var/www/html:cached
      # Mount configuration files
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./php.ini:/usr/local/etc/php/conf.d/custom.ini:ro
      # Mount writable directories
      - ./writable/cache:/var/www/html/writable/cache
      - ./writable/logs:/var/www/html/writable/logs
      - ./writable/session:/var/www/html/writable/session
      - ./writable/uploads:/var/www/html/writable/uploads
      # Xdebug log
      - xdebug_logs:/var/log/xdebug
    networks:
      - ikm_network
    depends_on:
      db-service:
        condition: service_healthy
    environment:
      - APP_ENV=development
      - APP_DEBUG=true
      - DB_HOST=db-service
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-ikm_db}
      - DB_USERNAME=${DB_USERNAME:-root}
      - DB_PASSWORD=${DB_PASSWORD:-secret123}
      - XDEBUG_ENABLED=1
      - XDEBUG_MODE=develop,debug
    ports:
      - "${APP_PORT:-8080}:80"
      - "${APP_SSL_PORT:-8443}:443"
      - "${XDEBUG_PORT:-9003}:9003"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # =============================================================================
  # Web Service: Nginx Reverse Proxy (Opsional, jika ingin pisah dari app)
  # =============================================================================
  web-service:
    image: nginx:1.24-alpine
    container_name: ikm_web_service
    restart: unless-stopped
    volumes:
      - ./nginx-proxy.conf:/etc/nginx/nginx.conf:ro
      - ../public:/var/www/html/public:ro
      - ./nginx-logs:/var/log/nginx
    networks:
      - ikm_network
    depends_on:
      - app-service
    ports:
      - "${WEB_PORT:-80}:80"
      - "${WEB_SSL_PORT:-443}:443"
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # =============================================================================
  # Database Service: MySQL 8.0 dengan Partitioning Support
  # =============================================================================
  db-service:
    image: mysql:8.0
    container_name: ikm_db_service
    restart: unless-stopped
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --innodb-buffer-pool-size=512M
      --innodb-log-file-size=128M
      --innodb-flush-log-at-trx-commit=2
      --innodb-flush-method=O_DIRECT
      --max-connections=300
      --query-cache-size=128M
      --query-cache-type=1
      --innodb-file-per-table=1
      --innodb-default-row-format=DYNAMIC
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-secret123}
      MYSQL_DATABASE: ${DB_DATABASE:-ikm_db}
      MYSQL_USER: ${DB_USER:-ikm_user}
      MYSQL_PASSWORD: ${DB_USER_PASSWORD:-secret123}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init-scripts:/docker-entrypoint-initdb.d:ro
      - ./mysql-logs:/var/log/mysql
    networks:
      - ikm_network
    ports:
      - "${DB_PORT:-3306}:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD:-secret123}"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    cap_add:
      - SYS_NICE

  # =============================================================================
  # Queue Worker Service: Background Jobs Processor (Scalable)
  # =============================================================================
  queue-worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: ikm_queue_worker
    restart: unless-stopped
    command: >
      sh -c "
        sleep 10 &&
        php spark queue:work --daemon
      "
    working_dir: /var/www/html
    volumes:
      - ..:/var/www/html:cached
      - ./writable/logs:/var/www/html/writable/logs
    networks:
      - ikm_network
    depends_on:
      db-service:
        condition: service_healthy
    environment:
      - APP_ENV=development
      - DB_HOST=db-service
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-ikm_db}
      - DB_USERNAME=${DB_USERNAME:-root}
      - DB_PASSWORD=${DB_PASSWORD:-secret123}
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M
    healthcheck:
      test: ["CMD", "pgrep", "-f", "queue:work"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # =============================================================================
  # Scheduler Service: Cron Jobs Alternative
  # =============================================================================
  scheduler:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: ikm_scheduler
    restart: unless-stopped
    command: >
      sh -c "
        while true; do
          php spark scheduler:run;
          sleep 60;
        done
      "
    working_dir: /var/www/html
    volumes:
      - ..:/var/www/html:cached
      - ./writable/logs:/var/www/html/writable/logs
    networks:
      - ikm_network
    depends_on:
      db-service:
        condition: service_healthy
    environment:
      - APP_ENV=development
      - DB_HOST=db-service
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-ikm_db}
      - DB_USERNAME=${DB_USERNAME:-root}
      - DB_PASSWORD=${DB_PASSWORD:-secret123}
    healthcheck:
      test: ["CMD", "pgrep", "-f", "scheduler:run"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # =============================================================================
  # Prometheus: Monitoring & Alerting
  # =============================================================================
  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: ikm_prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus-rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
    networks:
      - ikm_network
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    depends_on:
      - app-service
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

  # =============================================================================
  # Grafana: Dashboard Visualization
  # =============================================================================
  grafana:
    image: grafana/grafana:10.1.0
    container_name: ikm_grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin123}
      GF_INSTALL_PLUGINS: grafana-clock-panel,grafana-piechart-panel
      GF_SERVER_ROOT_URL: http://localhost:${GRAFANA_PORT:-3000}
      GF_LOG_LEVEL: info
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - ikm_network
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

# =============================================================================
# Networks Configuration
# =============================================================================
networks:
  ikm_network:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.20.0.0/16
          gateway: 172.20.0.1

# =============================================================================
# Volumes Configuration
# =============================================================================
volumes:
  mysql_data:
    driver: local
    name: ikm_mysql_data
  prometheus_data:
    driver: local
    name: ikm_prometheus_data
  grafana_data:
    driver: local
    name: ikm_grafana_data
  xdebug_logs:
    driver: local
    name: ikm_xdebug_logs
