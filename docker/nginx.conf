user www-data;
worker_processes auto;
pid /run/nginx.pid;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # =============================================================================
    # Logging Format untuk Monitoring (Prometheus)
    # =============================================================================
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    log_format prometheus 'nginx_requests_total{method="$request_method", '
                          'host="$host", uri="$uri", status="$status"} $requests';

    access_log /var/log/nginx/access.log main;

    # =============================================================================
    # Performance Settings
    # =============================================================================
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 20M;

    # Gzip Compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript 
               application/rss+xml application/atom+xml image/svg+xml;

    # =============================================================================
    # Security Headers
    # =============================================================================
    server_tokens off;
    
    # =============================================================================
    # Rate Limiting
    # =============================================================================
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=general_limit:10m rate=30r/s;

    # =============================================================================
    # Main Server Block
    # =============================================================================
    server {
        listen 80;
        server_name localhost;
        root /var/www/html/public;
        index index.php index.html;

        # Health check endpoint untuk monitoring
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # Metrics endpoint untuk Prometheus
        location /metrics {
            stub_status on;
            access_log off;
            allow 172.20.0.0/16;
            allow 127.0.0.1;
            deny all;
        }

        # API endpoints dengan rate limiting
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;
            
            try_files $uri $uri/ /index.php?$query_string;
        }

        # Assets statis
        location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # Upload files
        location /uploads/ {
            alias /var/www/html/writable/uploads/;
            expires 7d;
            add_header Cache-Control "public";
        }

        # PHP-FPM configuration
        location ~ \.php$ {
            fastcgi_pass 127.0.0.1:9000;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            include fastcgi_params;
            
            # Timeouts
            fastcgi_connect_timeout 60s;
            fastcgi_send_timeout 180s;
            fastcgi_read_timeout 180s;
            fastcgi_buffer_size 128k;
            fastcgi_buffers 4 256k;
            fastcgi_busy_buffers_size 256k;
        }

        # Deny access to sensitive files
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }

        location ~ /(composer\.json|composer\.lock|\.env|\.git|\.github) {
            deny all;
            access_log off;
            log_not_found off;
        }

        # CodeIgniter routing
        location / {
            limit_req zone=general_limit burst=50 nodelay;
            try_files $uri $uri/ /index.php?$query_string;
        }

        # Error pages
        error_page 404 /errors/404.html;
        error_page 500 502 503 504 /errors/500.html;
    }

    # =============================================================================
    # HTTPS Server Block (Production)
    # =============================================================================
    # server {
    #     listen 443 ssl http2;
    #     server_name your-domain.go.id;
    #     root /var/www/html/public;
    #     
    #     ssl_certificate /etc/nginx/ssl/your-domain.crt;
    #     ssl_certificate_key /etc/nginx/ssl/your-domain.key;
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     ssl_ciphers HIGH:!aNULL:!MD5;
    #     ssl_prefer_server_ciphers on;
    #     
    #     # Same configuration as HTTP server above
    # }
}
