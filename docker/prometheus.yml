# =============================================================================
# Prometheus Configuration untuk Aplikasi IKM v2.0.0
# =============================================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'ikm-monitor'
    environment: 'development'

# Alertmanager configuration (optional)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: ['alertmanager:9093']

# Rule files
rule_files:
  - /etc/prometheus/rules/*.yml

# Scrape configurations
scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: 'prometheus'

  # Application monitoring (PHP-FPM + Nginx)
  - job_name: 'app-service'
    static_configs:
      - targets: ['app-service:80']
        labels:
          service: 'app'
          environment: 'development'
    metrics_path: '/metrics'
    scrape_interval: 10s

  # MySQL Database monitoring
  - job_name: 'mysql'
    static_configs:
      - targets: ['db-service:3306']
        labels:
          service: 'mysql'
          environment: 'development'
    # Requires mysqld_exporter sidecar or separate exporter service

  # Redis monitoring
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-service:6379']
        labels:
          service: 'redis'
          environment: 'development'
    # Requires redis_exporter sidecar or separate exporter service

  # Node Exporter for system metrics (if available)
  - job_name: 'node'
    static_configs:
      - targets: ['app-service:9100']
        labels:
          service: 'node'
          environment: 'development'

  # Queue Worker monitoring
  - job_name: 'queue-worker'
    static_configs:
      - targets: ['queue-worker:80']
        labels:
          service: 'queue-worker'
          environment: 'development'
    metrics_path: '/metrics'
    scrape_interval: 10s

  # Scheduler monitoring
  - job_name: 'scheduler'
    static_configs:
      - targets: ['scheduler:80']
        labels:
          service: 'scheduler'
          environment: 'development'
    metrics_path: '/metrics'
    scrape_interval: 30s
