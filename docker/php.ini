; =============================================================================
; PHP Configuration untuk Aplikasi IKM v2.0.0
; Optimized untuk Production dengan Security & Performance
; =============================================================================

[PHP]
; Basic Settings
engine = On
short_open_tag = Off
precision = 14
output_buffering = 4096
zlib.output_compression = Off
implicit_flush = Off
serialize_precision = -1

; Error Handling (Production Settings)
display_errors = Off
display_startup_errors = Off
report_memleaks = On
html_errors = On
log_errors = On
error_log = /var/log/php_errors.log

; Performance Optimization
max_execution_time = 300
max_input_time = 300
memory_limit = 512M
max_input_vars = 5000

; File Uploads
file_uploads = On
upload_max_filesize = 20M
max_file_uploads = 20
post_max_size = 25M

; Session Configuration (Secure)
session.save_handler = files
session.use_strict_mode = 1
session.use_cookies = 1
session.use_only_cookies = 1
session.name = ikm_session
session.auto_start = 0
session.cookie_lifetime = 7200
session.cookie_httponly = 1
session.cookie_secure = 1
session.cookie_samesite = Strict
session.gc_maxlifetime = 7200
session.gc_probability = 1
session.gc_divisor = 1000
session.hash_function = sha256
session.sid_length = 32
session.trans_sid_hosts = 
session.trans_sid_tags = 

; OPcache (Performance)
opcache.enable = 1
opcache.enable_cli = 0
opcache.memory_consumption = 256
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 20000
opcache.revalidate_freq = 60
opcache.fast_shutdown = 1
opcache.enable_file_override = 1
opcache.validate_timestamps = 1
opcache.save_comments = 1
opcache.jit = 1255
opcache.jit_buffer_size = 128M

; MySQLi
mysqli.default_host = 
mysqli.default_port = 3306
mysqli.default_socket = 
mysqli.allow_persistent = On
mysqli.max_persistent = -1
mysqli.max_links = -1
mysqli.reconnect = Off

; PDO
pdo_mysql.default_socket = 

; Date & Time
date.timezone = Asia/Jakarta
date.default_latitude = -6.1751
date.default_longitude = 106.8650

; SMTP (untuk email notifications)
SMTP = localhost
smtp_port = 25
mail.add_x_header = Off
mail.log = /var/log/mail.log

; cURL
curl.cainfo = 

; OpenSSL
openssl.cafile = 

; Iconv
iconv.input_encoding = UTF-8
iconv.internal_encoding = UTF-8
iconv.output_encoding = UTF-8

; Intl
intl.default_locale = id_ID
intl.error_level = E_WARNING

; Mbstring
mbstring.language = Indonesian
mbstring.internal_encoding = UTF-8
mbstring.http_output = UTF-8
mbstring.func_overload = 0
mbstring.string_encoding_detection = strict

; Exif
exif.encode_unicode = ISO-8859-15
exif.decode_unicode_motorola = UCS-2BE
exif.decode_unicode_intel = UCS-2LE

; SOAP
soap.wsdl_cache_enabled = 1
soap.wsdl_cache_dir = /tmp
soap.wsdl_cache_ttl = 86400

; LDAP
ldap.max_links = -1

; Redis (untuk queue & cache)
redis.session.locking_enabled = 1
redis.session.lock_retries = -1
redis.session.lock_wait_time = 2000

; Custom IKM Settings
; =============================================================================
; Ini adalah custom settings khusus untuk aplikasi IKM
; =============================================================================

; Maximum survey responses per batch
ikm.batch_size = 1000

; Queue workers count
ikm.queue_workers = 4

; API rate limit per minute
ikm.api_rate_limit = 60

; Data retention period (days) untuk UU PDP
ikm.data_retention_days = 730

; Enable audit logging
ikm.audit_logging = On

; Encryption key rotation period (days)
ikm.encryption_rotation_days = 90

; Backup retention (days)
ikm.backup_retention_days = 365

; Monitoring metrics interval (seconds)
ikm.metrics_interval = 30
