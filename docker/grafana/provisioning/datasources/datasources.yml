# =============================================================================
# Grafana Datasource Provisioning untuk IKM v2.0.0
# =============================================================================

apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true
    jsonData:
      timeInterval: "15s"
      httpMethod: POST
      manageAlerts: true
      prometheusType: Prometheus
      prometheusVersion: "2.47.0"

  - name: MySQL
    type: mysql
    access: proxy
    url: db-service:3306
    database: ikm_db
    user: ikm_user
    secureJsonData:
      password: secret123
    jsonData:
      maxOpenConns: 10
      maxIdleConns: 5
      connMaxLifetime: 3600
      tlsSkipVerify: true
    editable: false

  - name: Redis
    type: redis
    access: proxy
    url: redis-service:6379
    jsonData:
      poolSize: 5
      timeout: 10
    editable: false
