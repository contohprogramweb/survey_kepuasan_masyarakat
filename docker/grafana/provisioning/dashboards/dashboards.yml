# =============================================================================
# Grafana Dashboard Provisioning untuk IKM v2.0.0
# =============================================================================

apiVersion: 1

providers:
  - name: 'IKM Dashboards'
    orgId: 1
    folder: 'IKM Application'
    folderUid: 'ikm-app'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: true

  - name: 'IKM System Monitoring'
    orgId: 1
    folder: 'System Monitoring'
    folderUid: 'system-monitoring'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards/system
      foldersFromFilesStructure: true
